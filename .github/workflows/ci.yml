name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Type-check
        run: uv run pyright

      - name: Tests
        run: uv run pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pythia:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/pythia

      - name: Helm template (minimal)
        run: |
          helm template pythia deploy/helm/pythia \
            --set slack.botToken=xoxb-x --set slack.appToken=xapp-x \
            --set llm.apiKey=sk-x --set llm.model=openai/gpt-4o-mini \
            > /dev/null

      - name: Helm template (full)
        run: |
          helm template pythia deploy/helm/pythia \
            --set slack.botToken=xoxb-x --set slack.appToken=xapp-x \
            --set llm.apiKey=sk-x --set llm.model=openai/gpt-4o-mini \
            --set mcp.existingSecret=mcp \
            --set prompt.existingConfigMap=prompt \
            --set codebase.repos="api=git@github.com:acme/api.git" \
            --set codebase.sshExistingSecret=ssh \
            > /dev/null

      - name: Helm template (existingSecret)
        run: |
          helm template pythia deploy/helm/pythia \
            --set existingSecret=mysec --set llm.model=openai/gpt-4o-mini \
            > /dev/null
