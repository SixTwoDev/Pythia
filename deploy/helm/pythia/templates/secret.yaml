{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pythia.fullname" . }}
  labels:
    {{- include "pythia.labels" . | nindent 4 }}
type: Opaque
stringData:
  SLACK_BOT_TOKEN: {{ required "slack.botToken is required (or set existingSecret)" .Values.slack.botToken | quote }}
  SLACK_APP_TOKEN: {{ required "slack.appToken is required (or set existingSecret)" .Values.slack.appToken | quote }}
{{- end }}
